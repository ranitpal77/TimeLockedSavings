name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-contract:
    name: Build & Test Smart Contract (CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Run tests
        run: cargo test
        working-directory: contracts/time_locked_savings

  build-frontend:
    name: Build Frontend (CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm install
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  deploy-frontend:
    name: Deploy to Netlify (CD)
    needs: build-frontend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://timevault.007575.xyz/
    steps:
      - name: Acknowledge Netlify Deployment
        run: |
          echo "Continuous Deployment is handled automatically by Netlify."
          echo "Live URL: https://timevault.007575.xyz/"
